name: Workflow intake
description: Request help for one protected local MCP workflow, a hardening review, or trust-gate diagnosis.
title: "[workflow-intake] "
body:
  - type: input
    id: client
    attributes:
      label: MCP client or host tool
      description: Codex, Claude Code, or another tool that is driving the MCP workflow.
      placeholder: Codex
    validations:
      required: true
  - type: input
    id: downstream
    attributes:
      label: Downstream MCP server
      description: What local server or tool surface do you want to protect?
      placeholder: local filesystem server
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Protected workflow
      description: Describe the risky file/search/fetch/execute path you want to guard.
    validations:
      required: true
  - type: textarea
    id: help_needed
    attributes:
      label: Intake goal
      description: Blocked integration, trust-gate diagnosis, rollout question, or another concrete need.
    validations:
      required: true
  - type: textarea
    id: sanitized_context
    attributes:
      label: Sanitized evidence
      description: Share only sanitized commands, configs, logs, or screenshots. Do not include secrets.
    validations:
      required: true
  - type: dropdown
    id: follow_up
    attributes:
      label: Private follow-up required
      description: Choose yes if the real details cannot be shared publicly after sanitization.
      options:
        - no
        - yes
    validations:
      required: true
