name: Setup request
description: Request help for a protected local MCP workflow, setup review, or policy tuning.
title: "[setup] "
body:
  - type: input
    id: client
    attributes:
      label: MCP client
      description: Which MCP client or integration are you using?
      placeholder: Desktop MCP client
    validations:
      required: true
  - type: input
    id: downstream
    attributes:
      label: Downstream MCP server
      description: What local server or tool surface do you want to protect?
      placeholder: local filesystem server
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Protected workflow
      description: Describe the risky file/search/fetch/execute path you want to guard.
    validations:
      required: true
  - type: textarea
    id: help_needed
    attributes:
      label: Help needed
      description: Setup walkthrough, workflow review, policy tuning, or something else concrete.
    validations:
      required: true
  - type: textarea
    id: sanitized_context
    attributes:
      label: Sanitized context
      description: Share only sanitized commands, configs, logs, or screenshots. Do not include secrets.
    validations:
      required: true
  - type: dropdown
    id: follow_up
    attributes:
      label: Private follow-up needed
      description: Choose yes if the real details cannot be shared publicly after sanitization.
      options:
        - no
        - yes
    validations:
      required: true
  - type: dropdown
    id: feedback
    attributes:
      label: Can you share follow-up results
      description: Only if you are comfortable sharing a short note about what worked or what failed.
      options:
        - yes
        - maybe
        - no
    validations:
      required: true
