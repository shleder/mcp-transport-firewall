name: Detection gap or false positive
description: Report a missed unsafe flow or an over-blocking trust-gate decision.
title: "[detection] "
labels:
  - enhancement
  - detection-gap
  - detection-gap
body:
  - type: dropdown
    id: class
    attributes:
      label: Report type
      options:
        - missed detection
        - false positive
    validations:
      required: true
  - type: dropdown
    id: gate
    attributes:
      label: Relevant gate
      options:
        - nhi-auth-validator
        - scope-validator
        - color-boundary
        - preflight-validator
        - schema-validator
        - ast-egress-filter
        - response sanitization
        - cache behavior
        - other
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal sample
      description: Provide the smallest request, payload, or scenario that shows the problem.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Security impact
      description: Explain why this matters and what should have happened instead.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Add logs, tests, or links if relevant.
