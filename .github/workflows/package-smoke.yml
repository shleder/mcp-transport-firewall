name: Package Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  package-smoke:
    name: Build And Verify npm Package
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI bundle
        run: npm run build

      - name: Dry-run npm pack
        run: npm run pack:dry-run

      - name: Smoke test packaged CLI
        run: npm run pack:smoke
