name: Release npm Package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Verify, Benchmark, And Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tag = process.env.GITHUB_REF_NAME;
          const expectedTag = `v${pkg.version}`;
          if (tag !== expectedTag) {
            throw new Error(`Release tag ${tag} does not match package.json version ${pkg.version}. Expected ${expectedTag}.`);
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Run verification suite
        run: npm run verify:all

      - name: Generate stdio benchmark evidence packet
        run: npm run benchmark:stdio -- --json > evidence.json

      - name: Dry-run npm pack
        run: npm run pack:dry-run

      - name: Smoke test packaged CLI
        run: npm run pack:smoke

      - name: Summarize benchmark evidence
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync('evidence.json', 'utf8'));
          const lines = [
            '## stdio benchmark',
            '',
            `- verdict: \`${report.verdict}\``,
            `- cases: \`${report.totals.cases}\``,
            `- requests: \`${report.totals.requests}\``,
            `- false positives: \`${report.totals.falsePositives}\``,
            `- false negatives: \`${report.totals.falseNegatives}\``,
            `- cache consistency failures: \`${report.totals.cacheConsistencyFailures}\``,
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          NODE

      - name: Upload stdio benchmark evidence packet
        uses: actions/upload-artifact@v4
        with:
          name: stdio-evidence-benchmark
          path: evidence.json

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: evidence.json
          body: |
            Release evidence:

            - full verification suite passed
            - stdio benchmark attached as `evidence.json`
            - npm tarball smoke checks passed before publication
