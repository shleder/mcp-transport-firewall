version: '3.8'

services:
  api:
    build:
      context: .
    container_name: mcp-api
    ports:
      - "9090:9090"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  ui:
    image: node:20-alpine
    container_name: mcp-ui
    working_dir: /app
    volumes:
      - ./ui:/app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    ports:
      - "4173:4173"
    restart: unless-stopped
    depends_on:
      - api
